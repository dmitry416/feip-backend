[program:messenger-router]
command=php /var/www/html/bin/console messenger:consume async_import --limit=100 --time-limit=3600
process_name=%(program_name)s_%(process_num)02d
numprocs=1
directory=/var/www/html
autostart=true
autorestart=true
startsecs=3
startretries=10
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/html/var/log/messenger_router.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

